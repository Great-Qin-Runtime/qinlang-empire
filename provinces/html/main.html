<!doctype html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8" />
  <title>文骨郡 · 仪礼简表</title>
  <link rel="stylesheet" href="main.css" />
</head>
<body class="court">
  <header class="palace">
    <h1>仪礼简表</h1>
    <p class="subtitle">文骨郡谨陈仪节于朝廷</p>
  </header>
  <main>
    <section class="rite" data-weight="1">
      <h2>朝礼</h2>
      <p>群臣晨集，皆按位次而立。</p>
    </section>
    <section class="rite" data-weight="1">
      <h2>祭礼</h2>
      <p>祭天地、祭社稷、祭先王。</p>
    </section>
    <section class="rite" data-weight="1">
      <h2>军礼</h2>
      <p>誓师、献俘、纳降。</p>
    </section>
    <section class="rite" data-weight="1">
      <h2>宾礼</h2>
      <p>诸侯朝贡之节。</p>
    </section>
    <section class="rite" data-weight="1">
      <h2>嘉礼</h2>
      <p>冠、婚、燕、飨之礼。</p>
    </section>
  </main>
</body>
</html>
